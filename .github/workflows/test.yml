name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The data-layer tests are pure Node, so skip downloading the Electron binary.
      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - run: npm test
